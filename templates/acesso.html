<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Financeiro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <main class="login-page">

        <section class="login-card financeiro">
            <div class="login-glow"></div>

            <div class="login-brand-main">
                <img src="{{ url_for('static', filename='grupo_geniale.png') }}" class="login-group-logo" alt="Grupo Geniale">
                <div>
                    <strong>GRUPO GENIALE</strong>
                    <span>Geniale + Paniz</span>
                </div>
            </div>

            <div class="login-header">
                <div class="login-lock">🔒</div>
                <div>
                    <h1>ACESSO FINANCEIRO</h1>
                    <p>Área restrita para download da consolidadora financeira</p>
                </div>
            </div>

            {% if erro %}
            <div class="login-error">
                {{ erro }}
            </div>
            {% endif %}

            <form method="POST" class="login-form">
                <label for="senha">Senha de acesso</label>

                <input type="password" id="senha" name="senha" placeholder="Digite a senha" required autofocus>

                <button type="submit" class="login-button">
                    🔒 ACESSAR E BAIXAR
                </button>
            </form>

            <a href="/" class="login-back">← Voltar para o portal</a>
        </section>

    </main>

</body>

</html>
