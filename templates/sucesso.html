<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Atualização Iniciada</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body class="center-page">

    <div class="success-container">

        <div class="success-glow"></div>

        <div class="success-card">

            <div class="success-icon">
                🔄
            </div>

            <div class="success-title">
                ATUALIZAÇÃO INICIADA
            </div>

            <div class="success-subtitle">
                {{ relatorio.nome }}
            </div>

            <div class="success-description">
                {{ mensagem }}
                <br><br>
                A geração continuará em segundo plano. Volte ao portal e aguarde o status mudar para
                <strong>Disponível para download</strong>.
            </div>

            <a href="/">
                <button class="btn btn-dark success-button">
                    VOLTAR AO PORTAL
                </button>
            </a>

        </div>

    </div>

</body>

</html>
